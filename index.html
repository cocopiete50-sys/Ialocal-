<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>NEXUS · AI Chat</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; height: 100dvh; background: #09090b; color: #fafafa; font-family: 'Inter', sans-serif; overflow: hidden; }

::-webkit-scrollbar { width: 3px; }
::-webkit-scrollbar-thumb { background: #27272a; border-radius: 4px; }

/* ── Layout ── */
#app { display: flex; height: 100dvh; }

/* ── Sidebar ── */
#sidebar {
width: 260px; flex-shrink: 0;
background: #09090b; border-right: 1px solid #18181b;
display: flex; flex-direction: column;
transition: transform .3s cubic-bezier(.4,0,.2,1);
position: relative; z-index: 20;
}
#sidebar-overlay {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,.6); z-index: 19;
}
@media (max-width: 700px) {
#sidebar { position: fixed; top:0; left:0; bottom:0; transform: translateX(-100%); }
#sidebar.open { transform: translateX(0); }
#sidebar-overlay.show { display: block; }
}

/* ── Main ── */
#main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

/* ── Header ── */
#topbar {
height: 52px; border-bottom: 1px solid #18181b;
display: flex; align-items: center; gap: 10px;
padding: 0 14px; flex-shrink: 0;
background: #09090b;
}

/* ── Messages ── */
#msgs-wrap { flex: 1; overflow-y: auto; }
#msgs { max-width: 680px; margin: 0 auto; padding: 20px 14px; display: flex; flex-direction: column; gap: 16px; }

.msg-user {
align-self: flex-end;
background: #3f3f46; border-radius: 18px 18px 4px 18px;
padding: 10px 14px; max-width: 80%;
font-size: 14px; line-height: 1.6; white-space: pre-wrap;
word-break: break-word;
}
.msg-ai {
align-self: flex-start; width: 100%;
background: #18181b; border: 1px solid #27272a;
border-radius: 4px 18px 18px 18px;
padding: 12px 14px; font-size: 14px; line-height: 1.7;
word-break: break-word;
}
.msg-ai p { margin-bottom: 8px; }
.msg-ai p:last-child { margin-bottom: 0; }
.msg-ai h1,.msg-ai h2,.msg-ai h3 { font-weight: 700; margin: 12px 0 6px; color: #fff; }
.msg-ai ul,.msg-ai ol { padding-left: 20px; margin-bottom: 8px; }
.msg-ai li { margin-bottom: 3px; }
.msg-ai strong { color: #fff; font-weight: 600; }
.msg-ai code:not(pre code) {
background: #27272a; border-radius: 4px; padding: 1px 5px;
font-family: ‘JetBrains Mono’, monospace; font-size: 12px; color: #a78bfa;
}
.msg-ai pre {
background: #000; border: 1px solid #27272a; border-radius: 8px;
padding: 12px; overflow-x: auto; margin: 8px 0;
font-family: ‘JetBrains Mono’, monospace; font-size: 12px;
}
.msg-ai a { color: #818cf8; text-decoration: underline; }

.msg-meta { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.model-badge {
font-size: 10px; font-family: ‘JetBrains Mono’, monospace;
background: #27272a; color: #71717a; border-radius: 6px;
padding: 2px 7px; letter-spacing: .05em; text-transform: uppercase;
}
.copy-btn {
margin-left: auto; font-size: 10px; color: #52525b; cursor: pointer;
background: none; border: none; padding: 2px 6px; border-radius: 5px;
font-family: ‘Inter’, sans-serif; transition: color .15s;
}
.copy-btn:hover { color: #a1a1aa; }

/* streaming cursor */
.streaming::after {
content: ‘▋’; animation: blink .7s step-start infinite; color: #6366f1;
}
@keyframes blink { 50% { opacity: 0; } }

/* ── Input ── */
#input-area {
padding: 12px 14px; padding-bottom: max(12px, env(safe-area-inset-bottom));
border-top: 1px solid #18181b; background: #09090b; flex-shrink: 0;
}
#input-wrap {
max-width: 680px; margin: 0 auto;
display: flex; align-items: flex-end; gap: 8px;
background: #18181b; border: 1px solid #27272a;
border-radius: 16px; padding: 8px 10px 8px 14px;
transition: border-color .2s;
}
#input-wrap:focus-within { border-color: #6366f1; }
#user-input {
flex: 1; background: none; border: none; outline: none;
color: #fafafa; font-size: 15px; line-height: 1.5; resize: none;
font-family: ‘Inter’, sans-serif; max-height: 120px; overflow-y: auto;
}
#user-input::placeholder { color: #52525b; }
#send-btn {
width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
background: #6366f1; border: none; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: background .2s, transform .1s;
}
#send-btn:hover { background: #4f46e5; }
#send-btn:active { transform: scale(.95); }
#send-btn:disabled { background: #27272a; cursor: not-allowed; }
#send-btn svg { width: 16px; height: 16px; }

/* ── Buttons ── */
.icon-btn {
width: 34px; height: 34px; border-radius: 8px; border: none;
background: none; color: #71717a; cursor: pointer;
display: flex; align-items: center; justify-content: center;
transition: background .15s, color .15s;
}
.icon-btn:hover { background: #18181b; color: #fafafa; }
.icon-btn svg { width: 17px; height: 17px; }

.pill-select {
background: #18181b; border: 1px solid #27272a; border-radius: 8px;
color: #a1a1aa; font-size: 12px; font-family: ‘JetBrains Mono’, monospace;
padding: 4px 8px; outline: none; cursor: pointer;
}

/* ── Sidebar items ── */
.conv-item {
display: flex; align-items: center; gap: 8px;
padding: 8px 10px; border-radius: 8px; cursor: pointer;
border: 1px solid transparent; transition: all .15s;
font-size: 13px; color: #a1a1aa;
}
.conv-item:hover { background: #18181b; color: #fafafa; }
.conv-item.active { background: #18181b; border-color: #27272a; color: #fafafa; }
.conv-item .del-btn {
margin-left: auto; opacity: 0; background: none; border: none;
color: #71717a; cursor: pointer; padding: 2px; transition: opacity .15s, color .15s;
}
.conv-item:hover .del-btn { opacity: 1; }
.conv-item .del-btn:hover { color: #ef4444; }

/* ── Settings panel ── */
#settings-panel {
display: none; flex-direction: column; gap: 0;
border-top: 1px solid #18181b;
}
#settings-panel.open { display: flex; }

.settings-inner { padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }

label.field-label {
font-size: 10px; font-weight: 600; text-transform: uppercase;
letter-spacing: .08em; color: #52525b; display: block; margin-bottom: 5px;
}
.field-input {
width: 100%; background: #18181b; border: 1px solid #27272a;
border-radius: 8px; padding: 8px 10px; color: #fafafa;
font-size: 13px; outline: none; transition: border-color .2s;
font-family: ‘Inter’, sans-serif;
}
.field-input:focus { border-color: #6366f1; }
.field-select {
width: 100%; background: #18181b; border: 1px solid #27272a;
border-radius: 8px; padding: 8px 10px; color: #fafafa;
font-size: 13px; outline: none; cursor: pointer;
}
textarea.field-input { resize: none; }

.slider-wrap { display: flex; flex-direction: column; gap: 4px; }
.slider-row { display: flex; justify-content: space-between; align-items: center; }
.slider-val { font-size: 11px; font-family: ‘JetBrains Mono’, monospace; color: #6366f1; }
input[type=range] {
width: 100%; accent-color: #6366f1; height: 4px;
background: #27272a; border-radius: 2px; outline: none;
-webkit-appearance: none; appearance: none;
}
input[type=range]::-webkit-slider-thumb {
-webkit-appearance: none; width: 14px; height: 14px;
border-radius: 50%; background: #6366f1; cursor: pointer;
box-shadow: 0 0 6px rgba(99,102,241,.5);
}

/* ── Modals ── */
#api-modal {
display: none; position: fixed; inset: 0; z-index: 100;
background: rgba(0,0,0,.75); align-items: center; justify-content: center;
}
#api-modal.show { display: flex; }
.modal-box {
background: #18181b; border: 1px solid #27272a; border-radius: 16px;
padding: 24px; width: min(360px, calc(100vw - 32px));
}

/* ── Empty state ── */
#empty {
display: flex; flex-direction: column; align-items: center;
justify-content: center; text-align: center; min-height: 60vh;
gap: 10px; padding: 32px;
}

/* ── Toast ── */
#toast {
position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
background: #27272a; border: 1px solid #3f3f46; border-radius: 10px;
padding: 8px 16px; font-size: 12px; color: #a1a1aa;
opacity: 0; transition: opacity .2s; pointer-events: none; z-index: 200;
font-family: ‘JetBrains Mono’, monospace;
}
#toast.show { opacity: 1; }

/* ── Animations ── */
.slide-up { animation: slideUp .2s cubic-bezier(.34,1.56,.64,1); }
@keyframes slideUp { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
</style>

</head>

<script>
// ── MODELS ──
const MODELS = {
  'gemini-2.0-flash':  '2.0 Flash',
  'gemini-1.5-flash':  '1.5 Flash',
  'gemini-1.5-pro':    '1.5 Pro',
};

// ── STATE ──
let convs = JSON.parse(localStorage.getItem('nx_convs') || '[]');
let curId = null;
let busy = false;

// ── INIT ──
(function init() {
  // Mobile menu button
  if (window.innerWidth <= 700) {
    document.getElementById('menu-btn').style.display = 'flex';
  }
  window.addEventListener('resize', () => {
    document.getElementById('menu-btn').style.display = window.innerWidth <= 700 ? 'flex' : 'none';
  });

  // Load prefs
  const m = localStorage.getItem('nx_model') || 'gemini-2.0-flash';
  document.getElementById('model-select').value = m;
  updateModelLabel(m);

  // Render conv list
  renderConvList();

  // Load last conv
  if (convs.length > 0) loadConv(convs[0].id);

  // Show API modal if no key
  if (!localStorage.getItem('nx_key')) setTimeout(showApiModal, 300);

  // marked config
  marked.setOptions({ breaks: true, gfm: true });
})();

// ── SIDEBAR ──
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('show');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('show');
}
function toggleSettings() {
  document.getElementById('settings-panel').classList.toggle('open');
}

// ── CONV MANAGEMENT ──
function save() { localStorage.setItem('nx_convs', JSON.stringify(convs)); }

function newChat() {
  const id = 'c' + Date.now();
  convs.unshift({ id, title: 'Nouveau chat', msgs: [] });
  save();
  loadConv(id);
  closeSidebar();
}

function loadConv(id) {
  curId = id;
  renderConvList();
  renderMsgs();
}

function getConv() { return convs.find(c => c.id === curId); }

function deleteConv(id, e) {
  e.stopPropagation();
  convs = convs.filter(c => c.id !== id);
  save();
  if (curId === id) {
    curId = convs.length ? convs[0].id : null;
    renderMsgs();
  }
  renderConvList();
}

function clearAll() {
  if (!confirm('Effacer toutes les conversations ?')) return;
  convs = []; curId = null; save();
  renderConvList(); renderMsgs();
}

function renderConvList() {
  const el = document.getElementById('conv-list');
  if (!convs.length) {
    el.innerHTML = '<p style="font-size:11px;color:#3f3f46;text-align:center;padding:16px;font-family:JetBrains Mono,monospace;">Aucune conversation</p>';
    return;
  }
  el.innerHTML = convs.map(c => `
    <div class="conv-item ${c.id === curId ? 'active' : ''}" onclick="loadConv('${c.id}');closeSidebar()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" style="flex-shrink:0;color:#52525b"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(c.title)}</span>
      <button class="del-btn" onclick="deleteConv('${c.id}',event)">
        <svg width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
  `).join('');
}

// ── RENDER MESSAGES ──
function renderMsgs() {
  const conv = getConv();
  const el = document.getElementById('msgs');

  if (!conv || !conv.msgs.length) {
    document.getElementById('chat-title').textContent = conv ? conv.title : 'Nouveau chat';
    el.innerHTML = `
      <div id="empty">
        <div style="width:52px;height:52px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;">
          <svg width="24" height="24" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <h1 style="font-size:20px;font-weight:700;">NEXUS Chat</h1>
        <p style="font-size:13px;color:#52525b;max-width:240px;line-height:1.6;">Commence à taper pour démarrer la conversation.</p>
      </div>`;
    return;
  }

  document.getElementById('chat-title').textContent = conv.title;
  el.innerHTML = conv.msgs.map((m, i) => m.role === 'user'
    ? `<div class="msg-user slide-up">${esc(m.content)}</div>`
    : `<div class="slide-up">
        <div class="msg-meta">
          <span class="model-badge">${esc(m.model || 'Gemini')}</span>
          <button class="copy-btn" onclick="copyMsg(${i})">Copier</button>
        </div>
        <div class="msg-ai">${marked.parse(m.content || '')}</div>
      </div>`
  ).join('');

  Prism.highlightAllUnder(el);
  scrollBottom();
}

function scrollBottom() {
  const w = document.getElementById('msgs-wrap');
  w.scrollTop = w.scrollHeight;
}

function copyMsg(i) {
  const conv = getConv();
  if (!conv) return;
  navigator.clipboard.writeText(conv.msgs[i].content).then(() => toast('Copié !'));
}

// ── SEND ──
async function send() {
  if (busy) return;
  const input = document.getElementById('user-input');
  const text = input.value.trim();
  if (!text) return;

  const key = localStorage.getItem('nx_key');
  if (!key) { showApiModal(); toast('Entre ta clé API !'); return; }

  if (!curId) newChat();
  const conv = getConv();

  input.value = '';
  autoResize(input);

  // Push user msg
  conv.msgs.push({ role: 'user', content: text });
  if (conv.msgs.length === 1) {
    conv.title = text.slice(0, 45) + (text.length > 45 ? '…' : '');
    renderConvList();
  }
  save();

  const model = document.getElementById('model-select').value;
  const aiMsg = { role: 'model', content: '', model: MODELS[model] || model };
  conv.msgs.push(aiMsg);

  // Render with streaming placeholder
  renderMsgs();
  const lastEl = document.getElementById('msgs').lastElementChild?.querySelector('.msg-ai');
  if (lastEl) lastEl.classList.add('streaming');

  busy = true;
  document.getElementById('send-btn').disabled = true;

  try {
    await streamGemini(key, model, conv, aiMsg, lastEl);
  } catch (err) {
    aiMsg.content = `**Erreur :** ${err.message}`;
    if (lastEl) { lastEl.innerHTML = marked.parse(aiMsg.content); lastEl.classList.remove('streaming'); }
    toast('Erreur API', true);
  }

  busy = false;
  document.getElementById('send-btn').disabled = false;
  save();
  // Final clean render
  renderMsgs();
}

async function streamGemini(key, model, conv, aiMsg, streamEl) {
  const sysPrompt = document.getElementById('sys-prompt').value.trim();
  const temp = parseFloat(document.getElementById('temp-slider').value);
  const topP = parseFloat(document.getElementById('topp-slider').value);

  // Build history excluding last placeholder
  const history = conv.msgs.slice(0, -1).map(m => ({
    role: m.role === 'user' ? 'user' : 'model',
    parts: [{ text: m.content }]
  }));

  const body = {
    contents: history,
    generationConfig: { temperature: temp, topP, maxOutputTokens: 8192 }
  };
  if (sysPrompt) body.systemInstruction = { parts: [{ text: sysPrompt }] };

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:streamGenerateContent?key=${key}&alt=sse`;

  const resp = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });

  if (!resp.ok) {
    const e = await resp.json().catch(() => ({}));
    throw new Error(e?.error?.message || `Erreur HTTP ${resp.status}`);
  }

  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    const lines = buf.split('\n');
    buf = lines.pop();

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const raw = line.slice(6).trim();
      if (!raw || raw === '[DONE]') continue;
      try {
        const chunk = JSON.parse(raw);
        const txt = chunk.candidates?.[0]?.content?.parts?.[0]?.text || '';
        if (txt && streamEl) {
          aiMsg.content += txt;
          streamEl.innerHTML = marked.parse(aiMsg.content);
          scrollBottom();
        }
      } catch {}
    }
  }
  if (streamEl) streamEl.classList.remove('streaming');
}

// ── SETTINGS & API ──
function savePrefs() {
  const m = document.getElementById('model-select').value;
  localStorage.setItem('nx_model', m);
  updateModelLabel(m);
}

function updateModelLabel(m) {
  document.getElementById('model-label').textContent = MODELS[m] || m;
}

function showApiModal() { document.getElementById('api-modal').classList.add('show'); }
function hideApiModal() { document.getElementById('api-modal').classList.remove('show'); }

function saveApiKey() {
  const k = document.getElementById('modal-api-key').value.trim();
  if (!k) { toast('Clé vide !', true); return; }
  localStorage.setItem('nx_key', k);
  hideApiModal();
  toast('Clé sauvegardée ✓');
}

function toggleModalKey() {
  const i = document.getElementById('modal-api-key');
  i.type = i.type === 'password' ? 'text' : 'password';
}

// Close modal on bg click
document.getElementById('api-modal').addEventListener('click', function(e) {
  if (e.target === this) hideApiModal();
});

// ── HELPERS ──
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function toast(msg, err = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.color = err ? '#f87171' : '#a1a1aa';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
}
</script>
