<!DOCTYPE html>

<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>NEXUS PRO</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-core.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/plugins/autoloader/prism-autoloader.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<style>
:root{--app-h:100dvh}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:var(--app-h);overflow:hidden;background:#080810;color:#e2e2f0;font-family:'Inter',sans-serif}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#1e1e38;border-radius:4px}

#root{display:flex;height:var(–app-h)}

/* Sidebar */
#sb{width:260px;flex-shrink:0;background:#0b0b18;border-right:1px solid #15152a;display:flex;flex-direction:column;height:var(–app-h);transition:transform .28s cubic-bezier(.4,0,.2,1)}
@media(max-width:768px){
#sb{position:fixed;left:0;top:0;bottom:0;z-index:400;transform:translateX(-100%)}
#sb.open{transform:translateX(0)}
#ovl{display:block!important}
}
#ovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:399}

/* Main */
#main{flex:1;display:flex;flex-direction:column;min-width:0;height:var(–app-h)}
#topbar{height:50px;min-height:50px;flex-shrink:0;display:flex;align-items:center;gap:10px;padding:0 12px;background:#0b0b18;border-bottom:1px solid #15152a}
#msgs-wrap{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#msgs{max-width:680px;margin:0 auto;padding:20px 14px 8px;display:flex;flex-direction:column;gap:14px}
#bottom{flex-shrink:0;background:#0b0b18;border-top:1px solid #15152a;padding:10px 14px;padding-bottom:max(10px,env(safe-area-inset-bottom))}
#input-inner{max-width:680px;margin:0 auto}
#input-box{display:flex;align-items:flex-end;gap:8px;background:#111122;border:1px solid #1e1e38;border-radius:16px;padding:7px 8px 7px 14px;transition:border-color .2s}
#input-box:focus-within{border-color:rgba(99,102,241,.6);box-shadow:0 0 0 1px rgba(99,102,241,.2)}
#inp{flex:1;background:transparent;border:none;outline:none;color:#e2e2f0;font-size:15px;line-height:1.5;resize:none;font-family:‘Inter’,sans-serif;max-height:130px;overflow-y:auto}
#inp::placeholder{color:#333355}
#send{width:36px;height:36px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}
#send:hover{box-shadow:0 0 18px rgba(99,102,241,.45);transform:scale(1.05)}
#send:active{transform:scale(.95)}
#send:disabled{opacity:.3;transform:none;box-shadow:none;cursor:not-allowed}

/* Messages */
.mu{align-self:flex-end;background:linear-gradient(135deg,rgba(99,102,241,.18),rgba(139,92,246,.12));border:1px solid rgba(99,102,241,.25);border-radius:18px 18px 4px 18px;padding:10px 14px;max-width:82%;font-size:14px;line-height:1.65;white-space:pre-wrap;word-break:break-word}
.ma{background:#111122;border:1px solid #1a1a30;border-radius:4px 18px 18px 18px;padding:12px 14px;font-size:14px;line-height:1.7;word-break:break-word;color:#c0c0e0}
.ma p{margin:.35rem 0}.ma p:last-child{margin-bottom:0}
.ma h1,.ma h2,.ma h3{font-weight:700;color:#f0f0ff;margin:.8rem 0 .35rem}
.ma h1{font-size:1.15rem}.ma h2{font-size:1rem}.ma h3{font-size:.9rem}
.ma ul,.ma ol{padding-left:1.3rem;margin:.35rem 0}
.ma li{margin:.2rem 0}
.ma strong{color:#f0f0ff;font-weight:600}
.ma em{color:#c4b5fd}
.ma a{color:#818cf8;text-decoration:underline}
.ma blockquote{border-left:3px solid #6366f1;padding:.25rem .75rem;color:#8888aa;font-style:italic;margin:.4rem 0}
.ma table{border-collapse:collapse;width:100%;margin:.5rem 0;font-size:.8rem}
.ma th{background:#1a1a30;padding:.4rem .6rem;border:1px solid #252545;color:#e0e0ff;font-weight:600;text-align:left}
.ma td{padding:.35rem .6rem;border:1px solid #1c1c38;color:#a8a8c8}
.ma tr:nth-child(even) td{background:#0f0f20}

/* Code blocks */
.cw{border-radius:10px;overflow:hidden;border:1px solid #1e1e38;margin:.6rem 0}
.ch{display:flex;align-items:center;justify-content:space-between;background:#0d0d1e;padding:.35rem .75rem;border-bottom:1px solid #1e1e38}
.cl{font-family:‘JetBrains Mono’,monospace;font-size:.6rem;color:#6366f1;text-transform:uppercase;letter-spacing:.08em}
.cb{font-size:.6rem;font-family:‘JetBrains Mono’,monospace;color:#444488;background:#1a1a2e;border:1px solid #252545;border-radius:5px;padding:.15rem .5rem;cursor:pointer;transition:all .15s}
.cb:hover{color:#a5b4fc;border-color:#6366f1}
.ma pre{background:#08080f!important;padding:.8rem 1rem!important;margin:0!important;overflow-x:auto;font-family:‘JetBrains Mono’,monospace;font-size:.77rem;line-height:1.6}
.ma code:not(pre code){background:rgba(99,102,241,.14);border:1px solid rgba(99,102,241,.2);border-radius:4px;padding:1px 5px;font-family:‘JetBrains Mono’,monospace;font-size:.82em;color:#a5b4fc}

/* Streaming cursor */
.cur::after{content:‘▋’;animation:blink .65s step-start infinite;color:#6366f1}
@keyframes blink{50%{opacity:0}}

/* Animations */
.su{animation:su .2s cubic-bezier(.34,1.56,.64,1)}
@keyframes su{from{opacity:0;transform:translateY(8px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}

/* Dots */
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-g{background:#22c55e;box-shadow:0 0 7px rgba(34,197,94,.5);animation:dp 2s ease infinite}
.dot-i{background:#6366f1;animation:dp 2s ease infinite}
@keyframes dp{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.55);opacity:.4}}

/* Buttons */
.ib{width:34px;height:34px;border-radius:8px;border:none;background:transparent;color:#555580;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.ib:hover{background:#1a1a2e;color:#e2e2f0}
.ib svg{width:16px;height:16px}

/* Conv item */
.ci{display:flex;align-items:center;gap:7px;padding:7px 10px;border-radius:9px;cursor:pointer;border:1px solid transparent;transition:all .12s;font-size:12px;color:#8888bb}
.ci:hover{background:#12122a;border-color:#1e1e38}
.ci.act{background:#14142c;border-color:rgba(99,102,241,.4);color:#e2e2f0}
.ci .dx{margin-left:auto;display:flex;gap:4px;opacity:0;transition:opacity .12s}
.ci:hover .dx{opacity:1}
.ci .dx button{background:none;border:none;color:#444466;cursor:pointer;padding:2px;border-radius:4px;transition:color .12s;display:flex}
.ci .dx button:hover{color:#f87171}

/* Badge */
.badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:20px;font-size:.6rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;font-family:‘JetBrains Mono’,monospace;background:#111122;border:1px solid #1e1e38;color:#5566cc}

/* Modal */
.mbg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);z-index:999;align-items:center;justify-content:center;padding:0 14px}
.mbg.open{display:flex}
.mbox{background:#0d0d1c;border:1px solid #1e1e38;border-radius:18px;padding:20px;width:100%;max-width:460px;max-height:88dvh;overflow-y:auto}
.mbox::-webkit-scrollbar{display:none}

/* Form elements */
.fi{width:100%;background:#0a0a18;border:1px solid #1e1e38;border-radius:10px;padding:8px 12px;color:#e2e2f0;font-size:12px;outline:none;transition:border-color .2s;font-family:‘Inter’,sans-serif}
.fi:focus{border-color:#6366f1}
.fsel{width:100%;background:#0a0a18;border:1px solid #1e1e38;border-radius:10px;padding:8px 12px;color:#e2e2f0;font-size:12px;outline:none;cursor:pointer}
.fl{font-size:.65rem;font-weight:700;color:#555580;text-transform:uppercase;letter-spacing:.08em;display:block;margin-bottom:5px}
.sl{-webkit-appearance:none;appearance:none;height:3px;border-radius:2px;background:#1e1e38;outline:none;width:100%;cursor:pointer}
.sl::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:#6366f1;box-shadow:0 0 8px rgba(99,102,241,.4);cursor:pointer}

/* Tabs */
.tb{flex:1;padding:7px 4px;border-radius:8px;font-size:.7rem;font-weight:700;border:none;cursor:pointer;transition:all .15s;font-family:‘Inter’,sans-serif}
.tb.on{background:#1e1e38;color:#e2e2f0}
.tb.off{background:transparent;color:#444466}
.tb.off:hover{color:#8888cc}

/* Key card */
.kc{background:#0a0a18;border:1px solid #1e1e38;border-radius:10px;padding:10px 12px;transition:border-color .15s}
.kc.ok{border-color:rgba(34,197,94,.3)}
.kc.err{border-color:rgba(239,68,68,.3)}
.kc.or{border-color:rgba(251,146,60,.3)}

/* Provider badge */
.prov-g{background:rgba(99,102,241,.12);color:#a5b4fc;border:1px solid rgba(99,102,241,.25);border-radius:6px;padding:1px 6px;font-size:.58rem;font-family:‘JetBrains Mono’,monospace;font-weight:600;text-transform:uppercase}
.prov-or{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.25);border-radius:6px;padding:1px 6px;font-size:.58rem;font-family:‘JetBrains Mono’,monospace;font-weight:600;text-transform:uppercase}

/* Toast */
#toasts{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;align-items:center;gap:6px;pointer-events:none}
.t{padding:7px 14px;border-radius:12px;font-size:.72rem;font-weight:600;font-family:‘JetBrains Mono’,monospace;animation:su .2s ease;white-space:nowrap;pointer-events:none}
.t.s{background:#0f2a1a;border:1px solid rgba(34,197,94,.3);color:#4ade80}
.t.e{background:#2a0f0f;border:1px solid rgba(239,68,68,.3);color:#f87171}
.t.i{background:#14142e;border:1px solid rgba(99,102,241,.3);color:#a5b4fc}

/* Stop bar */
#stopbar{display:none;justify-content:center;padding:6px;flex-shrink:0}
.stopbtn{background:#2a0f0f;border:1px solid rgba(239,68,68,.35);color:#f87171;border-radius:9px;padding:5px 12px;font-size:.72rem;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:‘Inter’,sans-serif;transition:all .15s}
.stopbtn:hover{background:#3a1010}

/* Scroll btn */
#scrollbtn{position:fixed;right:1rem;z-index:50;width:34px;height:34px;border-radius:50%;background:#14142e;border:1px solid #25254a;color:#6366f1;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(0,0,0,.5)}
#scrollbtn:hover{border-color:#6366f1;box-shadow:0 0 14px rgba(99,102,241,.3)}
textarea:focus{outline:none}
</style>

</head>
<body>

<div id="toasts"></div>
<div id="ovl" onclick="closeSB()"></div>

<!-- MODAL PARAMÈTRES -->

<div class="mbg" id="modal">
<div class="mbox" onclick="event.stopPropagation()">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <div>
      <div style="font-size:15px;font-weight:800;color:#fff">Paramètres</div>
      <div style="font-size:11px;color:#444466;margin-top:2px">Clés · Modèles · Génération</div>
    </div>
    <button class="ib" onclick="closeModal()">
      <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
  </div>
  <!-- Tabs -->
  <div style="display:flex;gap:4px;background:#0a0a18;border-radius:10px;padding:4px;margin-bottom:16px">
    <button class="tb on" id="t-keys" onclick="setTab('keys')">Clés API</button>
    <button class="tb off" id="t-gen" onclick="setTab('gen')">Génération</button>
    <button class="tb off" id="t-sys" onclick="setTab('sys')">System</button>
  </div>

  <!-- TAB KEYS -->

  <div id="p-keys">
    <!-- Provider selector -->
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <button onclick="setProvider('gemini')" id="pb-gemini"
        style="flex:1;padding:8px;border-radius:9px;font-size:.72rem;font-weight:700;border:1px solid rgba(99,102,241,.4);background:rgba(99,102,241,.1);color:#a5b4fc;cursor:pointer;transition:all .15s">
        🔷 Google Gemini
      </button>
      <button onclick="setProvider('openrouter')" id="pb-openrouter"
        style="flex:1;padding:8px;border-radius:9px;font-size:.72rem;font-weight:700;border:1px solid #1e1e38;background:transparent;color:#555580;cursor:pointer;transition:all .15s">
        🟠 OpenRouter
      </button>
    </div>
    <div id="keys-list" style="display:flex;flex-direction:column;gap:6px;margin-bottom:10px"></div>
    <div style="display:flex;gap:6px">
      <input id="ki" type="password" class="fi" placeholder="Clé API (AIza…, AQ…, sk-or-v1-…)" style="flex:1">
      <input id="kl" type="text" class="fi" placeholder="Label" style="width:80px">
      <button onclick="addKey()" style="padding:8px 12px;background:#6366f1;border:none;border-radius:9px;color:#fff;font-size:12px;font-weight:700;cursor:pointer">+</button>
    </div>
    <p style="font-size:.6rem;color:#252545;margin-top:7px;font-family:'JetBrains Mono',monospace">Clés chiffrées AES-GCM · Jamais envoyées ailleurs que l'API choisie</p>
  </div>

  <!-- TAB GEN -->

  <div id="p-gen" style="display:none;flex-direction:column;gap:14px">
    <div>
      <label class="fl">Modèle Gemini par défaut</label>
      <select id="def-model-g" class="fsel">
        <option value="gemini-2.5-flash-preview-04-17">Gemini 2.5 Flash ⚡ (recommandé)</option>
        <option value="gemini-2.5-pro-preview-03-25">Gemini 2.5 Pro 🧠</option>
        <option value="gemini-2.0-flash">Gemini 2.0 Flash ✨</option>
        <option value="gemini-2.0-flash-lite">Gemini 2.0 Flash Lite 🔥</option>
      </select>
    </div>
    <div>
      <label class="fl">Modèle OpenRouter par défaut</label>
      <select id="def-model-or" class="fsel">
        <option value="meta-llama/llama-3.3-70b-instruct:free">Llama 3.3 70B (GRATUIT)</option>
        <option value="deepseek/deepseek-r1:free">DeepSeek R1 (GRATUIT)</option>
        <option value="google/gemma-3-27b-it:free">Gemma 3 27B (GRATUIT)</option>
        <option value="mistralai/mistral-7b-instruct:free">Mistral 7B (GRATUIT)</option>
        <option value="anthropic/claude-3.5-sonnet">Claude 3.5 Sonnet</option>
        <option value="openai/gpt-4o">GPT-4o</option>
        <option value="openai/gpt-4o-mini">GPT-4o Mini</option>
        <option value="google/gemini-2.0-flash-001">Gemini 2.0 Flash (OR)</option>
      </select>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <label class="fl" style="margin:0">Température</label>
        <span style="font-size:.7rem;font-family:'JetBrains Mono',monospace;color:#6366f1" id="tv">0.70</span>
      </div>
      <input type="range" class="sl" id="ts" min="0" max="2" step="0.01" value="0.7" oninput="document.getElementById('tv').textContent=parseFloat(this.value).toFixed(2)">
      <div style="display:flex;justify-content:space-between;font-size:.6rem;color:#252545;font-family:'JetBrains Mono',monospace;margin-top:3px"><span>Précis</span><span>Créatif</span></div>
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <label class="fl" style="margin:0">Top-P</label>
        <span style="font-size:.7rem;font-family:'JetBrains Mono',monospace;color:#6366f1" id="pv">0.95</span>
      </div>
      <input type="range" class="sl" id="ps" min="0" max="1" step="0.01" value="0.95" oninput="document.getElementById('pv').textContent=parseFloat(this.value).toFixed(2)">
    </div>
    <div>
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <label class="fl" style="margin:0">Max Tokens</label>
        <span style="font-size:.7rem;font-family:'JetBrains Mono',monospace;color:#6366f1" id="tkv">8192</span>
      </div>
      <input type="range" class="sl" id="tks" min="256" max="32768" step="256" value="8192" oninput="document.getElementById('tkv').textContent=this.value">
    </div>
  </div>

  <!-- TAB SYS -->

  <div id="p-sys" style="display:none">
    <label class="fl">System Instruction</label>
    <textarea id="sysp" class="fi" rows="5" placeholder="Tu es NEXUS, une IA avancée. Tu réponds en français, de manière précise." style="resize:none;line-height:1.6"></textarea>
  </div>

  <button onclick="saveSettings()" style="width:100%;margin-top:16px;padding:11px;background:linear-gradient(135deg,#6366f1,#8b5cf6);border:none;border-radius:11px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:opacity .2s" onmouseover="this.style.opacity='.85'" onmouseout="this.style.opacity='1'">
    Sauvegarder
  </button>
</div>
</div>

<!-- ROOT -->

<div id="root">

<!-- SIDEBAR -->

<aside id="sb">
  <!-- Logo -->
  <div style="padding:12px;border-bottom:1px solid #15152a">
    <div style="display:flex;align-items:center;gap:9px;margin-bottom:10px">
      <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;flex-shrink:0">
        <svg width="13" height="13" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <div style="font-size:13px;font-weight:800;color:#fff;letter-spacing:-.01em">NEXUS PRO</div>
        <div style="font-size:.58rem;font-family:'JetBrains Mono',monospace;color:#333355;margin-top:-1px">Gemini · OpenRouter</div>
      </div>
      <div class="dot dot-g" style="margin-left:auto"></div>
    </div>
    <button onclick="newChat()" style="width:100%;display:flex;align-items:center;justify-content:center;gap:7px;padding:8px;border-radius:9px;border:1px dashed #1e1e38;background:transparent;color:#444477;font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif" onmouseover="this.style.borderColor='#6366f1';this.style.color='#a5b4fc'" onmouseout="this.style.borderColor='#1e1e38';this.style.color='#444477'">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Nouveau chat
    </button>
  </div>

  <!-- Provider tabs in sidebar -->

  <div style="display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid #15152a">
    <button onclick="filterProv('all')" id="fp-all" class="tb on" style="font-size:.65rem;padding:4px">Tous</button>
    <button onclick="filterProv('gemini')" id="fp-gemini" class="tb off" style="font-size:.65rem;padding:4px">Gemini</button>
    <button onclick="filterProv('openrouter')" id="fp-openrouter" class="tb off" style="font-size:.65rem;padding:4px">OpenRouter</button>
  </div>

  <!-- Conv list -->

  <div id="cl" style="flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:2px"></div>

  <!-- Bottom -->

  <div style="padding:8px;border-top:1px solid #15152a;display:flex;flex-direction:column;gap:2px">
    <button onclick="openModal()" style="display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:8px;border:none;background:transparent;color:#555580;font-size:12px;font-weight:600;cursor:pointer;width:100%;transition:all .15s;font-family:'Inter',sans-serif" onmouseover="this.style.background='#12122a';this.style.color='#e2e2f0'" onmouseout="this.style.background='transparent';this.style.color='#555580'">

(()=>{
// ═══════════════════════════════

let keyCache=[], provFilter='all';

// ═══════════════════════════════
// CRYPTO
// ═══════════════════════════════
async function ckey(){
  let s=localStorage.getItem('nx_s');
  if(!s){s=Array.from(crypto.getRandomValues(new Uint8Array(24))).join('-');localStorage.setItem('nx_s',s)}
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode('nx-v4-'+s),'PBKDF2',false,['deriveKey']);
  return crypto.subtle.deriveKey({name:'PBKDF2',salt:new TextEncoder().encode('nx-salt-v4'),iterations:8000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);
}
async function enc(t){
  const k=await ckey(),iv=crypto.getRandomValues(new Uint8Array(12));
  const e=await crypto.subtle.encrypt({name:'AES-GCM',iv},k,new TextEncoder().encode(t));
  const b=new Uint8Array(12+e.byteLength);b.set(iv,0);b.set(new Uint8Array(e),12);
  return btoa(Array.from(b,x=>String.fromCharCode(x)).join(''));
}
async function dec(d){
  try{
    const k=await ckey(),b=Uint8Array.from(atob(d),c=>c.charCodeAt(0));
    const r=await crypto.subtle.decrypt({name:'AES-GCM',iv:b.slice(0,12)},k,b.slice(12));
    return new TextDecoder().decode(r);
  }catch{return null}
}

// ═══════════════════════════════
// KEY STORAGE
// ═══════════════════════════════
function rawKeys(){try{return JSON.parse(localStorage.getItem('nx_keys')||'[]')}catch{return[]}}
function saveRaw(k){localStorage.setItem('nx_keys',JSON.stringify(k))}

async function loadKeys(){
  const raw=rawKeys(); keyCache=[];
  for(const r of raw){
    const plain=await dec(r.enc);
    if(plain) keyCache.push({...r, key:plain});
  }
  return keyCache;
}

function detectProvider(key){
  if(key.startsWith('sk-or-')) return 'openrouter';
  return 'gemini';
}

window.addKey=async function(){
  const kv=document.getElementById('ki').value.trim();
  const lbl=document.getElementById('kl').value.trim()||`Clé ${rawKeys().length+1}`;
  if(!kv){toast('Entre une clé !','e');return}
  const prov=detectProvider(kv);
  const e=await enc(kv);
  const raw=rawKeys();
  raw.push({id:Date.now().toString(),enc:e,label:lbl,provider:prov,status:'unknown'});
  saveRaw(raw); await loadKeys();
  document.getElementById('ki').value='';
  document.getElementById('kl').value='';
  renderKeys(); updateKI();
  toast(`Clé "${lbl}" ajoutée (${prov==='openrouter'?'OpenRouter':'Gemini'})`,'s');
};

window.delKey=async function(id){
  saveRaw(rawKeys().filter(k=>k.id!==id));
  await loadKeys(); renderKeys(); updateKI();
  toast('Clé supprimée','i');
};

window.testKey=async function(id){
  const raw=rawKeys(); const kObj=raw.find(k=>k.id===id);
  if(!kObj) return;
  const plain=await dec(kObj.enc); if(!plain){toast('Erreur déchiffrement','e');return}
  toast('Test en cours…','i');
  try{
    let ok=false, msg='';
    if(kObj.provider==='openrouter'){
      const r=await fetch('https://openrouter.ai/api/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+plain,'HTTP-Referer':'https://nexus-pro.app','X-Title':'NEXUS PRO'},
        body:JSON.stringify({model:'meta-llama/llama-3.3-70b-instruct:free',messages:[{role:'user',content:'hi'}],max_tokens:5})
      });
      const j=await r.json();
      ok=r.ok; msg=j.error?.message||`HTTP ${r.status}`;
    } else {
      const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent',{
        method:'POST',
        headers:{'Content-Type':'application/json','x-goog-api-key':plain},
        body:JSON.stringify({contents:[{role:'user',parts:[{text:'hi'}]}],generationConfig:{maxOutputTokens:5}})
      });
      const j=await r.json();
      ok=r.ok; msg=j.error?.message||`HTTP ${r.status}`;
    }
    kObj.status=ok?'ok':'err';
    const idx=raw.findIndex(k=>k.id===id); if(idx>=0) raw[idx]=kObj;
    saveRaw(raw); await loadKeys(); renderKeys(); updateKI();
    toast(ok?`✓ "${kObj.label}" valide`:`✗ ${msg.slice(0,70)}`, ok?'s':'e');
  }catch(e){kObj.status='err';toast('Erreur réseau: '+e.message,'e')}
};

function renderKeys(){
  const raw=rawKeys();
  const prov=modalProvider;
  const filtered=raw.filter(k=>k.provider===prov||!k.provider&&prov==='gemini');
  const el=document.getElementById('keys-list');
  if(!filtered.length){
    el.innerHTML=`<div style="text-align:center;padding:20px;font-size:.7rem;font-family:'JetBrains Mono',monospace;color:#252545">Aucune clé ${prov==='openrouter'?'OpenRouter':'Gemini'}</div>`;
    return;
  }
  const sc={ok:'color:#4ade80',err:'color:#f87171',quota:'color:#fbbf24',unknown:'color:#444488',testing:'color:#818cf8'};
  const sl={ok:'● OK',err:'✗ ERR',quota:'⚠ QUOTA',unknown:'○ ?',testing:'… TEST'};
  el.innerHTML=filtered.map(k=>`
    <div class="kc ${k.status==='ok'?'ok':k.status==='err'||k.status==='quota'?'err':k.provider==='openrouter'?'or':''}">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:6px">
            <span style="font-size:.75rem;font-weight:700;color:#e2e2f0">${esc(k.label)}</span>
            <span class="${k.provider==='openrouter'?'prov-or':'prov-g'}">${k.provider==='openrouter'?'OpenRouter':'Gemini'}</span>
            <span style="font-size:.6rem;font-family:'JetBrains Mono',monospace;${sc[k.status||'unknown']||sc.unknown}">${sl[k.status||'unknown']||'○'}</span>
          </div>
          <div style="font-size:.6rem;font-family:'JetBrains Mono',monospace;color:#252545;margin-top:2px">••••${k.id.slice(-4)}</div>
        </div>
        <div style="display:flex;gap:5px;flex-shrink:0">
          <button onclick="testKey('${k.id}')" style="background:#0e0e1e;border:1px solid #1e1e38;border-radius:7px;padding:3px 8px;font-size:.6rem;color:#555580;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s" onmouseover="this.style.borderColor='#6366f1';this.style.color='#a5b4fc'" onmouseout="this.style.borderColor='#1e1e38';this.style.color='#555580'">Test</button>
          <button onclick="delKey('${k.id}')" style="background:#0e0e1e;border:1px solid #1e1e38;border-radius:7px;padding:3px 8px;font-size:.6rem;color:#555580;cursor:pointer;transition:all .15s" onmouseover="this.style.borderColor='#ef4444';this.style.color='#f87171'" onmouseout="this.style.borderColor='#1e1e38';this.style.color='#555580'">✕</button>
        </div>
      </div>
    </div>`).join('');
}

function updateKI(){
  const el=document.getElementById('prov-indicator');
  const lbl=document.getElementById('ki-label');
  const dot=document.getElementById('ki-dot');
  const active=keyCache.filter(k=>k.provider===curProvider||(!k.provider&&curProvider==='gemini'));
  if(!active.length){lbl.textContent='No key';dot.style.background='#ef4444';return}
  const best=active.find(k=>k.status==='ok')||active[0];
  lbl.textContent=best.label+(curProvider==='openrouter'?' [OR]':'');
  dot.style.background=best.status==='ok'?'#22c55e':best.status==='quota'?'#fbbf24':'#ef4444';
}

async function getBestKey(prov){
  await loadKeys();
  const pool=keyCache.filter(k=>(k.provider||'gemini')===prov);
  if(!pool.length) throw new Error(`Aucune clé ${prov==='openrouter'?'OpenRouter':'Gemini'} configurée. Va dans Paramètres ⚙`);
  const ok=pool.find(k=>k.status!=='err')||pool[0];
  return ok.key;
}

// ═══════════════════════════════
// API CALLS
// ═══════════════════════════════
async function streamGemini(msgs, sys, onTok, sig){
  const modelId=document.getElementById('msel').value;
  const key=await getBestKey('gemini');
  const url=`https://generativelanguage.googleapis.com/v1beta/models/${modelId}:streamGenerateContent?alt=sse`;
  const body={
    contents:msgs.map(m=>({role:m.role==='user'?'user':'model',parts:[{text:m.content}]})),
    generationConfig:{
      temperature:parseFloat(document.getElementById('ts').value),
      topP:parseFloat(document.getElementById('ps').value),
      maxOutputTokens:parseInt(document.getElementById('tks').value),
    }
  };
  if(sys) body.systemInstruction={parts:[{text:sys}]};
  const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','x-goog-api-key':key},body:JSON.stringify(body),signal:sig});
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${resp.status}`)}
  await readSSE(resp,onTok);
}

async function streamOR(msgs, sys, onTok, sig){
  const modelId=document.getElementById('msel').value;
  const key=await getBestKey('openrouter');
  const messages=[];
  if(sys) messages.push({role:'system',content:sys});
  msgs.forEach(m=>messages.push({role:m.role==='user'?'user':'assistant',content:m.content}));
  const resp=await fetch('https://openrouter.ai/api/v1/chat/completions',{
    method:'POST',
    headers:{
      'Content-Type':'application/json',
      'Authorization':'Bearer '+key,
      'HTTP-Referer':'https://nexus-pro.app',
      'X-Title':'NEXUS PRO'
    },
    body:JSON.stringify({
      model:modelId,
      messages,
      stream:true,
      temperature:parseFloat(document.getElementById('ts').value),
      top_p:parseFloat(document.getElementById('ps').value),
      max_tokens:parseInt(document.getElementById('tks').value),
    }),
    signal:sig
  });
  if(!resp.ok){const e=await resp.json().catch(()=>({}));throw new Error(e.error?.message||`HTTP ${resp.status}`)}
  // OpenRouter uses OpenAI SSE format
  await readSSE(resp,onTok,'or');
}

async function readSSE(resp, onTok, fmt='gemini'){
  const reader=resp.body.getReader(), dec=new TextDecoder();
  let buf='';
  try{
    while(true){
      const{done,value}=await reader.read();
      if(done) break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split('\n'); buf=lines.pop();
      for(const line of lines){
        const t=line.trim();
        if(!t.startsWith('data:')) continue;
        const json=t.slice(5).trim();
        if(!json||json==='[DONE]') continue;
        try{
          const chunk=JSON.parse(json);
          let txt='';
          if(fmt==='or') txt=chunk.choices?.[0]?.delta?.content||'';
          else txt=chunk.candidates?.[0]?.content?.parts?.[0]?.text||'';
          if(txt) onTok(txt);
        }catch{}
      }
    }
  }catch(e){if(e.name!=='AbortError') throw e}
  finally{reader.releaseLock()}
}

function saveConvs(){try{localStorage.setItem('nx_convs',JSON.stringify(convs))}catch{}}

window.loadConv=function(id){
  activeId=id;
  const c=convs.find(x=>x.id===id);

    // Restore model + provider
    if(c.model && document.getElementById('msel').querySelector(`option[value="${c.model}"]`)){
      document.getElementById('msel').value=c.model;
      onModelChange();
    }
  }
  renderCL(); renderMsgs(); closeSB();
  setTimeout(()=>scrollBot(false),50);
};

window.delConv=function(id,e){
  e.stopPropagation();
  convs=convs.filter(c=>c.id!==id); saveConvs();

  renderCL();
};

window.clearAll=function(){
  if(!confirm('Effacer tout ?')) return;
  convs=[]; activeId=null; saveConvs(); renderCL(); renderMsgs();
};

// RENDER
// ═══════════════════════════════
let filterPV='all';

  filterPV=p;

    const b=document.getElementById('fp-'+x);

  renderCL();

function renderCL(){
  const el=document.getElementById('cl');
  const filtered=filterPV==='all'?convs:convs.filter(c=>(c.provider||'gemini')===filterPV);
  if(!filtered.length){
    el.innerHTML=`<p style="text-align:center;font-size:.65rem;font-family:'JetBrains Mono',monospace;color:#1e1e38;padding:20px">Aucune conversation</p>`;
    return;
  }
  el.innerHTML=filtered.map(c=>`
    <div class="ci${c.id===activeId?' act':''}" onclick="loadConv('${c.id}')">
      <svg style="flex-shrink:0;color:#252545" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
      <span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.72rem">${esc(c.title)}</span>
      ${c.provider==='openrouter'?`<span class="prov-or" style="flex-shrink:0">OR</span>`:''}
      <div class="dx">
        <button onclick="delConv('${c.id}',event)">
          <svg width="10" height="10" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
    </div>`).join('');
}

function renderMsgs(){
  const conv=getConv();
  const el=document.getElementById('msgs');
  document.getElementById('htitle').textContent=conv?.title||'Nouveau chat';
  if(!conv||!conv.messages.length){
    el.innerHTML=`
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center" class="su">
        <div style="width:54px;height:54px;border-radius:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 8px 28px rgba(99,102,241,.3)">
          <svg width="24" height="24" fill="none" stroke="white" stroke-width="2" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div style="font-size:18px;font-weight:800;color:#fff;margin-bottom:6px">NEXUS PRO</div>
        <div style="font-size:12px;color:#333355;line-height:1.7;max-width:260px">Gemini API + OpenRouter<br>${keyCache.length?keyCache.length+' clé(s) active(s)':'<button onclick="openModal()" style="color:#a5b4fc;background:none;border:none;cursor:pointer;font-size:inherit;text-decoration:underline">Configure ta clé API →</button>'}</div>
      </div>`;
    return;
  }
  el.innerHTML=conv.messages.map((m,i)=>buildMsg(m,i)).join('');
  postProcess(el);
  scrollBot(false);
  setTimeout(fixVP,50);
}

function buildMsg(m,i){
  if(m.role==='user') return `<div class="su mu">${esc(m.content)}</div>`;
  const isOR=(m.provider==='openrouter')||OR_MODELS[m.model];
  return `<div class="su">
    <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px">
      <span class="badge">
        <div class="dot ${isOR?'':'dot-i'}" style="width:5px;height:5px;${isOR?'background:#fb923c;animation:dp 2s ease infinite':''}"></div>
        ${esc(isOR?'OpenRouter':'Gemini')} · ${esc(m.modelLabel||m.model||'AI')}
      </span>
      <button onclick="cpMsg(${i})" style="margin-left:auto;font-size:.6rem;font-family:'JetBrains Mono',monospace;color:#252545;background:none;border:none;cursor:pointer;padding:2px 6px;border-radius:5px;transition:color .12s" onmouseover="this.style.color='#6366f1'" onmouseout="this.style.color='#252545'">
        <svg style="display:inline;width:9px;height:9px;margin-right:3px" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>Copier
      </button>
    </div>
    <div class="ma">${md(m.content)}</div>
  </div>`;
}

function postProcess(el){
  el.querySelectorAll('pre code').forEach(code=>{
    const pre=code.parentElement;
    if(pre.parentElement?.classList.contains('cw')) return;
    const lang=[...code.classList].find(c=>c.startsWith('language-'))?.replace('language-','')||'code';
    const wrap=document.createElement('div'); wrap.className='cw';
    const head=document.createElement('div'); head.className='ch';
    head.innerHTML=`<span class="cl">${esc(lang)}</span><button class="cb" onclick="cpCode(this)">Copier</button>`;
    pre.parentNode.insertBefore(wrap,pre); wrap.appendChild(head); wrap.appendChild(pre);
    if(Prism.languages[lang]) try{code.innerHTML=Prism.highlight(code.textContent,Prism.languages[lang],lang)}catch{}
  });
}

window.cpCode=function(btn){
  const c=btn.closest('.cw')?.querySelector('code')?.textContent||'';
  navigator.clipboard.writeText(c).then(()=>{btn.textContent='✓ Copié';setTimeout(()=>btn.textContent='Copier',2000)});
};
window.cpMsg=function(i){
  const conv=getConv(); if(!conv) return;
  navigator.clipboard.writeText(conv.messages[i]?.content||'').then(()=>toast('Copié','s'));
};

// ═══════════════════════════════
// MARKED
// ═══════════════════════════════
const ren=new marked.Renderer();
ren.code=function(code,lang){
  const l=lang||'plaintext';
  const safe=(code||'').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  return `<div class="cw"><div class="ch"><span class="cl">${esc(l)}</span><button class="cb" onclick="cpCode(this)">Copier</button></div><pre class="language-${esc(l)}"><code class="language-${esc(l)}">${safe}</code></pre></div>`;

};
marked.setOptions({renderer:ren,breaks:true,gfm:true});
function md(t){try{return marked.parse(t||’’,{breaks:true,gfm:true})}catch{return esc(t||’’)}}

// ═══════════════════════════════
// SEND
// ═══════════════════════════════
window.send=async function(){
if(streaming) return;
const inp=document.getElementById(‘inp’);
const text=inp.value.trim(); if(!text) return;
if(!activeId) newChat();
const conv=getConv(); if(!conv) return;
inp.value=’’; resize(inp);

conv.messages.push({role:‘user’,content:text});
const first=conv.messages.length===1;
if(first) conv.title=text.slice(0,45)+(text.length>45?’…’:’’);
conv.provider=curProvider;
conv.model=document.getElementById(‘msel’).value;
saveConvs(); renderCL();

const modelId=document.getElementById(‘msel’).value;
const isOR=!!OR_MODELS[modelId];
const modelLabel=isOR?OR_MODELS[modelId]:GEMINI_MODELS[modelId]||modelId;
const aiMsg={role:‘model’,content:’’,model:modelId,modelLabel,provider:isOR?‘openrouter’:‘gemini’};
conv.messages.push(aiMsg); saveConvs();

renderMsgs();
addStreamEl(aiMsg);

streaming=true; abort=new AbortController();
document.getElementById(‘send’).disabled=true;
document.getElementById(‘stopbar’).style.display=‘flex’;
setTimeout(fixVP,50);

const streamEl=document.getElementById(‘stream-c’);
try{
const fn=isOR?streamOR:streamGemini;
await fn(conv.messages.slice(0,-1), conv.sys||’’, tok=>{
aiMsg.content+=tok;
if(streamEl){streamEl.innerHTML=md(aiMsg.content); streamEl.className=‘cur’;}
scrollBot(false);
}, abort.signal);
}catch(e){
if(e.name!==‘AbortError’) aiMsg.content=`**Erreur:** ${e.message}`;
}

streaming=false;
document.getElementById(‘send’).disabled=false;
document.getElementById(‘stopbar’).style.display=‘none’;
abort=null; saveConvs(); renderMsgs();
setTimeout(fixVP,50);
if(first) setTimeout(()=>autoRename(activeId),1200);
};

function addStreamEl(aiMsg){
const el=document.getElementById(‘msgs’);
// Remove empty state
const empty=el.querySelector(’[class*=“su”]’);
if(empty&&!el.querySelector(’.mu’)&&!el.querySelector(’.ma’)) el.innerHTML=’’;
const isOR=aiMsg.provider===‘openrouter’;
const div=document.createElement(‘div’); div.id=‘stream-wrap’; div.className=‘su’;
div.innerHTML=` <div style="display:flex;align-items:center;gap:7px;margin-bottom:6px"> <span class="badge"> <div class="dot" style="width:5px;height:5px;background:${isOR?'#fb923c':'#6366f1'};animation:dp 2s ease infinite"></div> ${isOR?'OpenRouter':'Gemini'} · ${esc(aiMsg.modelLabel||'AI')} </span> </div> <div class="ma"><span id="stream-c" class="cur"></span></div>`;
el.appendChild(div);
scrollBot(true);
}

window.stopStream=function(){if(abort) abort.abort()};

// Auto-rename
async function autoRename(id){
const conv=convs.find(c=>c.id===id); if(!conv) return;
const first=conv.messages.find(m=>m.role===‘user’)?.content?.slice(0,300); if(!first) return;
try{
const key=await getBestKey(conv.provider||‘gemini’).catch(()=>null); if(!key) return;
let title=’’;
if(conv.provider===‘openrouter’){
const r=await fetch(‘https://openrouter.ai/api/v1/chat/completions’,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’,‘Authorization’:‘Bearer ‘+key,‘HTTP-Referer’:‘https://nexus-pro.app’,‘X-Title’:‘NEXUS PRO’},
body:JSON.stringify({model:‘meta-llama/llama-3.3-70b-instruct:free’,messages:[{role:‘user’,content:`Génère un titre ULTRA court (3 mots max, sans guillemets, sans ponctuation) pour: "${first}"`}],max_tokens:15})
});
const j=await r.json(); title=j.choices?.[0]?.message?.content?.trim()||’’;
} else {
const r=await fetch(‘https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent’,{
method:‘POST’,
headers:{‘Content-Type’:‘application/json’,‘x-goog-api-key’:key},
body:JSON.stringify({contents:[{role:‘user’,parts:[{text:`Génère un titre ULTRA court (3 mots max, sans guillemets) pour: "${first}"`}]}],generationConfig:{maxOutputTokens:15,temperature:0.3}})
});
const j=await r.json(); title=j.candidates?.[0]?.content?.parts?.[0]?.text?.trim()||’’;
}
if(title&&title.length>2){
conv.title=title.slice(0,50); saveConvs(); renderCL();
if(activeId===id) document.getElementById(‘htitle’).textContent=conv.title;
}
}catch{}
}

// ═══════════════════════════════
// SCROLL
// ═══════════════════════════════
const mw=document.getElementById(‘msgs-wrap’);
window.scrollBot=function(smooth=true){
mw.scrollTo({top:mw.scrollHeight,behavior:smooth?‘smooth’:‘instant’});
};
mw.addEventListener(‘scroll’,()=>{
const diff=mw.scrollHeight-mw.scrollTop-mw.clientHeight;
const btn=document.getElementById(‘scrollbtn’);
btn.style.display=diff>160?‘flex’:‘none’;
});

// ═══════════════════════════════
// SETTINGS UI
// ═══════════════════════════════
window.openModal=function(){
renderKeys(); updateKI();
document.getElementById(‘modal’).classList.add(‘open’);
};
window.closeModal=function(){document.getElementById(‘modal’).classList.remove(‘open’)};
document.getElementById(‘modal’).addEventListener(‘click’,function(e){if(e.target===this)closeModal()});

window.setTab=function(t){
[‘keys’,‘gen’,‘sys’].forEach(x=>{
document.getElementById(‘p-’+x).style.display=x===t?(x===‘gen’?‘flex’:‘block’):‘none’;
const b=document.getElementById(‘t-’+x);
b.className=b.className.replace(‘on’,’’).replace(‘off’,’’).trim()+’ ’+(x===t?‘on’:‘off’);
});
};

window.setProvider=function(p){
modalProvider=p;
const bg=document.getElementById(‘pb-gemini’), bor=document.getElementById(‘pb-openrouter’);
if(p===‘gemini’){
bg.style.cssText=‘flex:1;padding:8px;border-radius:9px;font-size:.72rem;font-weight:700;border:1px solid rgba(99,102,241,.4);background:rgba(99,102,241,.1);color:#a5b4fc;cursor:pointer;transition:all .15s’;
bor.style.cssText=‘flex:1;padding:8px;border-radius:9px;font-size:.72rem;font-weight:700;border:1px solid #1e1e38;background:transparent;color:#555580;cursor:pointer;transition:all .15s’;
} else {
bor.style.cssText=‘flex:1;padding:8px;border-radius:9px;font-size:.72rem;font-weight:700;border:1px solid rgba(251,146,60,.4);background:rgba(251,146,60,.1);color:#fb923c;cursor:pointer;transition:all .15s’;
bg.style.cssText=‘flex:1;padding:8px;border-radius:9px;font-size:.72rem;font-weight:700;border:1px solid #1e1e38;background:transparent;color:#555580;cursor:pointer;transition:all .15s’;
}
renderKeys();
};

window.saveSettings=function(){
const prefs={
modelG:document.getElementById(‘def-model-g’).value,
modelOR:document.getElementById(‘def-model-or’).value,
temp:document.getElementById(‘ts’).value,
topP:document.getElementById(‘ps’).value,
maxTok:document.getElementById(‘tks’).value,
sys:document.getElementById(‘sysp’).value,
};
localStorage.setItem(‘nx_prefs’,JSON.stringify(prefs));
closeModal(); toast(‘Paramètres sauvegardés’,‘s’);
};

function loadSettings(){
try{
const p=JSON.parse(localStorage.getItem(‘nx_prefs’)||’{}’);
if(p.modelG) document.getElementById(‘def-model-g’).value=p.modelG;
if(p.modelOR) document.getElementById(‘def-model-or’).value=p.modelOR;
if(p.temp){document.getElementById(‘ts’).value=p.temp;document.getElementById(‘tv’).textContent=parseFloat(p.temp).toFixed(2)}
if(p.topP){document.getElementById(‘ps’).value=p.topP;document.getElementById(‘pv’).textContent=parseFloat(p.topP).toFixed(2)}
if(p.maxTok){document.getElementById(‘tks’).value=p.maxTok;document.getElementById(‘tkv’).textContent=p.maxTok}
if(p.sys) document.getElementById(‘sysp’).value=p.sys;
}catch{}
}

// ═══════════════════════════════
// SIDEBAR
// ═══════════════════════════════
window.toggleSB=function(){
document.getElementById(‘sb’).classList.toggle(‘open’);
document.getElementById(‘ovl’).classList.toggle(‘active’);
};
window.closeSB=function(){
document.getElementById(‘sb’).classList.remove(‘open’);
document.getElementById(‘ovl’).classList.remove(‘active’);
};

// ═══════════════════════════════
// INPUT
// ═══════════════════════════════
window.resize=function(el){
el.style.height=‘auto’;
el.style.height=Math.min(el.scrollHeight,130)+‘px’;
setTimeout(fixVP,5);
};
window.onKey=function(e){if(e.key===‘Enter’&&!e.shiftKey){e.preventDefault();send()}};

// Mobile check
if(window.innerWidth<=768) document.getElementById(‘menu-btn’).style.display=‘flex’;
window.addEventListener(‘resize’,()=>{
document.getElementById(‘menu-btn’).style.display=window.innerWidth<=768?‘flex’:‘none’;
});

// Keyboard shortcuts
document.addEventListener(‘keydown’,e=>{
if((e.metaKey||e.ctrlKey)&&e.key===‘n’){e.preventDefault();newChat()}
if(e.key===‘Escape’){closeModal();closeSB()}
});

// ═══════════════════════════════
// TOAST
// ═══════════════════════════════
window.toast=function(msg,type=‘i’){
const el=document.createElement(‘div’);
el.className=`t ${type}`;el.textContent=msg;
document.getElementById(‘toasts’).appendChild(el);
setTimeout(()=>{el.style.transition=‘opacity .25s’;el.style.opacity=‘0’;setTimeout(()=>el.remove(),250)},2400);
};

// ═══════════════════════════════
// UTILS
// ═══════════════════════════════
function esc(s){return String(s||’’).replace(/&/g,’&’).replace(/</g,’<’).replace(/>/g,’>’).replace(/”/g,’"’)}

// ═══════════════════════════════
// INIT
// ═══════════════════════════════
async function init(){
loadConvs();
loadSettings();
buildModelSelect();
await loadKeys();
updateKI();
renderCL();
if(convs.length){activeId=convs[0].id;}
renderMsgs();
if(!keyCache.length) setTimeout(openModal,500);
requestAnimationFrame(()=>{fixVP();setTimeout(fixVP,200)});
}
init();
})();
</script>
